version: '3.8'

services:
  # 前端服务
  frontend:
    image: nginx:alpine
    container_name: contract-risk-frontend
    ports:
      - "80:80"
    volumes:
      - ./contract-risk-frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - contract-network

  # 后端服务（示例配置，需根据实际情况调整）
  backend:
    image: your-backend-image:latest
    container_name: contract-risk-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    networks:
      - contract-network

networks:
  contract-network:
    driver: bridge
